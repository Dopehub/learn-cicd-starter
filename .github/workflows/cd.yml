name: cd

on:
    push:
        branches: [main]

jobs:
    deployments:
        name: Deploy
        runs-on: ubuntu-latest

        steps:
            - name: Check out code
              uses: actions/checkout@v5
            
            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                go-version: "1.26.0"

            - name: Build
              run: ./scripts/buildprod.sh

    googleAuth:
        name: Auth
        runs-on: ubuntu-latest
        
        permissions:
            contents: 'read'
            id-token: 'write'
        steps:
            - uses: 'actions/checkout@v4'
            
            - uses: 'google-github-actions/auth@v3'
              with:
                project_id: 'notely-496809'
                workload_identity_provider: 'projects/241762517936/locations/global/workloadIdentityPools/github/providers/notely-repo'