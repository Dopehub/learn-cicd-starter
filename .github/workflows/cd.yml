name: cd

on:
    push:
        branches: [main]

jobs:
    deployments:
        name: Deploy
        runs-on: ubuntu-latest

        steps:
            - name: Check out code
              uses: actions/checkout@v5
            
            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                go-version: "1.26.0"
            - name: Build
              run: scripts/buildprod.sh